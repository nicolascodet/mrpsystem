<!DOCTYPE html>
<html>
<head>
    <title>Inventory - Guide MRP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="p-8">
        <!-- Navigation -->
        <div class="mb-8">
            <a href="index.html" class="text-blue-600 hover:underline">← Back to Dashboard</a>
        </div>

        <h1 class="text-3xl font-bold mb-8">Inventory</h1>
        
        <!-- Simple Inventory List -->
        <div class="bg-white rounded-lg shadow p-6">
            <div class="mb-4">
                <button class="bg-blue-500 text-white px-4 py-2 rounded">Add Material</button>
            </div>
            
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th class="text-left py-2">Material</th>
                        <th class="text-left py-2">Quantity</th>
                        <th class="text-left py-2">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="py-2">HDPE Natural</td>
                        <td>500 kg</td>
                        <td>In Stock</td>
                    </tr>
                    <tr>
                        <td class="py-2">PP Black</td>
                        <td>200 kg</td>
                        <td>Low Stock</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
