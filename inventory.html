<!DOCTYPE html>
<html>
<head>
    <title>Inventory - Guide MRP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-neutral-50">
    <!-- Top Navigation Bar -->
    <nav class="bg-stone-800 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="index.html" class="text-xl font-bold">Guide MRP</a>
                <span class="text-stone-400">|</span>
                <h1 class="text-lg">Inventory Management</h1>
            </div>
            <a href="index.html" class="text-stone-300 hover:text-white">← Back to Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <!-- Quick Actions -->
        <div class="flex justify-between mb-8">
            <div class="flex space-x-4">
                <button class="bg-stone-800 text-white px-6 py-2 rounded-lg hover:bg-stone-700">
                    Add Material
                </button>
                <button class="bg-stone-100 text-stone-800 px-6 py-2 rounded-lg hover:bg-stone-200">
                    Order Materials
                </button>
            </div>
            <div class="flex space-x-4">
                <button class="text-stone-600 hover:text-stone-800">Filter</button>
                <button class="text-stone-600 hover:text-stone-800">Export</button>
            </div>
        </div>

        <!-- Inventory Alerts -->
        <div class="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-lg mb-8">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-amber-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-amber-800">Low Stock Alert</h3>
                    <div class="mt-2 text-sm text-amber-700">
                        <p>2 materials are below minimum stock level. Review required.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Raw Materials Table -->
        <div class="bg-white rounded-lg shadow mb-8">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-bold text-stone-800">Raw Materials</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-stone-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-stone-500 uppercase tracking-wider">Material</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-stone-500 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-stone-500 uppercase tracking-wider">In Stock</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-stone-500 uppercase tracking-wider">Min Level</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-stone-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-stone-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr class="hover:bg-stone-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">HDPE Natural</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">Resin</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">500 kg</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">100 kg</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                    In Stock
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                <a href="#" class="text-stone-600 hover:text-stone-900">Update</a>
                            </td>
                        </tr>
                        <tr class="hover:bg-stone-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">PP Black</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">Resin</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">50 kg</td>
                            <td class="px-6
