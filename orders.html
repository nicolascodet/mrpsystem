<!DOCTYPE html>
<html>
<head>
    <title>Production & Orders - Ali MRP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-neutral-50">
    <!-- Top Navigation Bar -->
    <nav class="bg-stone-800 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-700 rounded-lg flex items-center justify-center shadow-lg">
                        <span class="text-white text-2xl font-bold">A</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-2xl font-bold text-white">Ali MRP</span>
                        <span class="text-xs text-blue-200">Production Orders</span>
                    </div>
                </div>
            </div>
            <div class="flex space-x-4">
                <a href="index.html" class="hover:text-stone-300">Dashboard</a>
                <a href="inventory.html" class="hover:text-stone-300">Inventory</a>
                <a href="quality.html" class="hover:text-stone-300">Quality</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto p-8">
        <!-- Action Buttons -->
        <div class="flex justify-between mb-8">
            <div class="flex space-x-4">
                <button onclick="showNewOrderModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">
                    New Order
                </button>
                <button onclick="showCustomerModal()" class="bg-stone-600 hover:bg-stone-700 text-white px-6 py-2 rounded-lg">
                    Add Customer
                </button>
            </div>
            <div class="flex space-x-4">
                <input type="text" placeholder="Search orders..." class="border rounded-lg px-4 py-2">
                <select class="border rounded-lg px-4 py-2">
                    <option>All Orders</option>
                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Completed</option>
                </select>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-bold">Active Orders</h2>
            </div>
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Order ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Product</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Quantity</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Due Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <!-- Orders will be populated here by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modals -->
    <div id="newOrderModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <h3 class="text-lg leading-6 font-medium text-gray-900">New Order</h3>
                <form id="newOrderForm" class="mt-4">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Customer</label>
                        <select class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                            <option>Select Customer</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Product</label>
                        <select class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                            <option>Select Product</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Quantity</label>
                        <input type="number" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Due Date</label>
                        <input type="date" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                    </div>
                    <div class="flex items-center justify-between">
                        <button type="button" onclick="closeModal('newOrderModal')" class="bg-gray-500 text-white px-4 py-2 rounded">Cancel</button>
                        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Create Order</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Sample data
        let orders = [
            {
                id: 'ORD-001',
                customer: 'Acme Corp',
                product: 'Widget A',
                quantity: 1000,
                dueDate: '2024-12-01',
                status: 'In Progress'
            },
            {
                id: 'ORD-002',
                customer: 'Tech Inc',
                product: 'Container B',
                quantity: 500,
                dueDate: '2024-12-15',
                status: 'Pending'
            }
        ];

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            renderOrdersTable();
        });

        function renderOrdersTable() {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = orders.map(order => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">${order.id}</td>
                    <td class="px-6 py-4">${order.customer}</td>
                    <td class="px-6 py-4">${order.product}</td>
                    <td class="px-6 py-4">${order.quantity}</td>
                    <td class="px-6 py-4">${order.dueDate}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full ${getStatusClass(order.status)}">
                            ${order.status}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <button onclick="viewOrder('${order.id}')" class="text-blue-600 hover:text-blue-900">
                            View
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            const classes = {
                'Pending': 'bg-yellow-100 text-yellow-800',
                'In Progress': 'bg-blue-100 text-blue-800',
                'Completed': 'bg-green-100 text-green-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }

        function showNewOrderModal() {
            document.getElementById('newOrderModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }
    </script>
</body>
</html>
