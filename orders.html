<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Guide MRP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="flex">
        <!-- Sidebar -->
        <div class="fixed h-full w-64 bg-white border-r border-gray-200 p-4">
            <div class="flex items-center space-x-2 mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Guide MRP</h1>
            </div>
            
            <!-- Navigation -->
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center space-x-2 p-2 rounded-lg text-gray-600 hover:bg-gray-50">
                    Dashboard
                </a>
                <a href="orders.html" class="flex items-center space-x-2 p-2 rounded-lg bg-blue-50 text-blue-700">
                    Orders
                </a>
                <a href="inventory.html" class="flex items-center space-x-2 p-2 rounded-lg text-gray-600 hover:bg-gray-50">
                    Inventory
                </a>
                <a href="manufacturing.html" class="flex items-center space-x-2 p-2 rounded-lg text-gray-600 hover:bg-gray-50">
                    Manufacturing
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="ml-64 p-8 flex-1">
            <h1 class="text-2xl font-bold mb-4">Orders</h1>
            
            <!-- Orders Table -->
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-lg font-semibold">Current Orders</h2>
                    <button onclick="alert('New Order')" class="bg-blue-500 text-white px-4 py-2 rounded">
                        New Order
                    </button>
                </div>
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Order ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr>
                            <td class="px-6 py-4">ORD-001</td>
                            <td class="px-6 py-4">Acme Corp</td>
                            <td class="px-6 py-4">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                    Active
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <button class="text-blue-600 hover:text-blue-900">View</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
