<!DOCTYPE html>
<html>
<head>
    <title>Orders - Guide MRP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="p-8">
        <!-- Navigation -->
        <div class="mb-8">
            <a href="index.html" class="text-blue-600 hover:underline">← Back to Dashboard</a>
        </div>

        <h1 class="text-3xl font-bold mb-8">Orders</h1>
        
        <!-- Simple Order List -->
        <div class="bg-white rounded-lg shadow p-6">
            <div class="mb-4">
                <button class="bg-blue-500 text-white px-4 py-2 rounded">New Order</button>
            </div>
            
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th class="text-left py-2">Order ID</th>
                        <th class="text-left py-2">Customer</th>
                        <th class="text-left py-2">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="py-2">001</td>
                        <td>Acme Corp</td>
                        <td>In Progress</td>
                    </tr>
                    <tr>
                        <td class="py-2">002</td>
                        <td>Tech Inc</td>
                        <td>Pending</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
